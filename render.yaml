services:
  - type: web
    name: naddownload
    env: python
    buildCommand: |
      pip install -r requirements.txt
      npm install --prefix frontend && npm run build --prefix frontend
    startCommand: cd backend && gunicorn server:app --worker-class gevent --bind 0.0.0.0:$PORT --timeout 120 --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /api/health
