services:
  - type: web
    name: gooddownload
    env: python
    buildCommand: |
      pip install -r requirements.txt
      cd frontend && npm install --legacy-peer-deps && npm run build && cd ..
    startCommand: gunicorn backend.server:app --worker-class gthread --threads 4 --bind 0.0.0.0:$PORT --timeout 120 --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: NODE_VERSION
        value: 20.11.0
    healthCheckPath: /api/health
